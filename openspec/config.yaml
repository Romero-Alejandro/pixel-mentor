# SDD Configuration for pixel-mentor

schema: spec-driven

context: |
  Tech stack: Node.js, Express, React, TypeScript, Prisma, PostgreSQL
  Architecture: Hexagonal architecture for backend, Feature-based organization for frontend
  Testing: Jest (backend), Playwright (E2E), Vitest (frontend unit tests)
  Style: ESLint, Prettier

strict_tdd: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  test_runner:
    command: 'pnpm test'
    framework: 'Jest'
  test_layers:
    unit: true
    integration: true
    e2e: true
  coverage:
    available: true
    command: 'pnpm test --coverage'
  quality_tools:
    linter:
      available: true
      command: 'pnpm lint'
    type_checker:
      available: true
      command: 'pnpm typecheck'
    formatter:
      available: true
      command: 'pnpm format'
