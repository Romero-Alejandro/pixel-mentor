name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://test:test@localhost:5432/test
  JWT_SECRET: test-secret-for-ci-must-be-at-least-32-chars-long
  CORS_ORIGIN: http://localhost:3000
  LLM_PROVIDER: groq
  GROQ_API_KEY: test-key

jobs:
  # ──────────────────────────────────────────────
  # 1. Security Audit Gate — PRIMARY GATE
  # ──────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        id: audit
        run: |
          echo "## Security Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Run audit with high threshold — only high/critical fail the build
          AUDIT_OUTPUT=$(pnpm audit --prod --audit-level=high 2>&1) || true
          echo "$AUDIT_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count vulnerabilities by severity
          HIGH_COUNT=$(echo "$AUDIT_OUTPUT" | grep -oP '\d+(?=\s+high)' || echo "0")
          CRITICAL_COUNT=$(echo "$AUDIT_OUTPUT" | grep -oP '\d+(?=\s+critical)' || echo "0")
          MODERATE_COUNT=$(echo "$AUDIT_OUTPUT" | grep -oP '\d+(?=\s+moderate)' || echo "0")
          LOW_COUNT=$(echo "$AUDIT_OUTPUT" | grep -oP '\d+(?=\s+low)' || echo "0")

          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | ${CRITICAL_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| High     | ${HIGH_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Moderate | ${MODERATE_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Low      | ${LOW_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY

          # Re-run with strict exit code to fail on high/critical
          pnpm audit --prod --audit-level=high

  # ──────────────────────────────────────────────
  # 2. Type Check
  # ──────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @pixel-mentor/api db:generate

      - name: Type check — API
        run: pnpm --filter @pixel-mentor/api typecheck

      - name: Type check — Web
        run: pnpm --filter @pixel-mentor/web typecheck

  # ──────────────────────────────────────────────
  # 3. Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint — API
        run: pnpm --filter @pixel-mentor/api lint

      - name: Lint — Web
        run: pnpm --filter @pixel-mentor/web lint

  # ──────────────────────────────────────────────
  # 4. Tests
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @pixel-mentor/api db:generate

      - name: Run API tests
        id: api-tests
        run: |
          set -o pipefail
          pnpm --filter @pixel-mentor/api test -- --coverage --coverageReporters=text --coverageReporters=text-summary 2>&1 | tee test-output.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: apps/api/test-output.txt
          retention-days: 5

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f apps/api/test-output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 apps/api/test-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ──────────────────────────────────────────────
  # 5. CI Summary (runs after all jobs)
  # ──────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [security-audit, typecheck, lint, test]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Determine overall status
          if [ "${{ needs.security-audit.result }}" = "success" ] && \
             [ "${{ needs.typecheck.result }}" = "success" ] && \
             [ "${{ needs.lint.result }}" = "success" ] && \
             [ "${{ needs.test.result }}" = "success" ]; then
            echo "✅ **All checks passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **One or more checks failed.** Review the job logs above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
