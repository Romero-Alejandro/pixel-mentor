info:
  name: List Sessions
  type: http
  seq: 5

http:
  method: GET
  url: http://localhost:3001/api/sessions?studentId=11111111-1111-1111-1111-111111111111

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests: |-
  if (response.status !== 200) throw new Error(`Expected 200, got ${response.status}`);
  if (!Array.isArray(response.body)) throw new Error('Expected array');
  bru.log(`✅ Retrieved ${response.body.length} session(s)`);
