info:
  name: List Lessons
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:3001/api/lessons?activeOnly=true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests: |-
  if (response.status !== 200) throw new Error(`Expected 200, got ${response.status}`);
  if (!Array.isArray(response.body)) throw new Error('Expected array response');
  if (response.body.length === 0) {
    bru.log('⚠️ No lessons found');
  } else {
    const required = ['id','title','description','concepts','questions','active'];
    for (const lesson of response.body) {
      for (const field of required) {
        if (!(field in lesson)) throw new Error(`Lesson missing field '${field}'`);
      }
      if (!Array.isArray(lesson.concepts) || lesson.concepts.length === 0) throw new Error('Lesson must have concepts');
      if (!Array.isArray(lesson.questions) || lesson.questions.length === 0) throw new Error('Lesson must have questions');
    }
    bru.log(`✅ Retrieved ${response.body.length} lesson(s)`);
  }
