info:
  name: API Info
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3001/api

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests: |-
  if (response.status !== 200) throw new Error(`Expected 200, got ${response.status}`);
  if (response.body.name !== 'Pixel Mentor API') throw new Error('Invalid API name');
  if (response.body.status !== 'running') throw new Error('API not running');
  bru.log('✅ API info ok', response.body);
