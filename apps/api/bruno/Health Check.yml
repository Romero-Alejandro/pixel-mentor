info:
  name: Health Check
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:3001/health

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests: |-
  if (response.status !== 200) throw new Error(`Expected 200, got ${response.status}`);
  if (!response.body.status || !response.body.timestamp) throw new Error('Missing required health fields');
  if (response.body.database && response.body.database !== 'healthy') throw new Error(`Database unhealthy: ${response.body.database}`);
  bru.log('✅ Health check passed', response.body);
