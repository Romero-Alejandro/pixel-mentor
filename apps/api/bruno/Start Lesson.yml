info:
  name: Start Lesson
  type: http
  seq: 7

http:
  method: POST
  url: http://localhost:3001/api/leccion/start
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "lessonId": "00000000-0000-0000-0000-000000000000",
        "studentId": "11111111-1111-1111-1111-111111111111"
      }

vars:
  post-response:
    - name: session_id
      value: res.body.sessionId
      description: Captured automatically for Run Collection

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests: |-
  if (response.status !== 201) throw new Error(`Expected 201, got ${response.status}`);
  const fields = ['sessionId','voiceText','pedagogicalState'];
  for (const f of fields) {
    if (!response.body[f]) throw new Error(`Missing field '${f}'`);
  }
  if (typeof response.body.sessionId !== 'string' || response.body.sessionId.length !== 36) {
    throw new Error(`Invalid sessionId format`);
  }
  const states = ['EXPLANATION','QUESTION','EVALUATION'];
  if (!states.includes(response.body.pedagogicalState)) {
    throw new Error(`Invalid pedagogicalState: ${response.body.pedagogicalState}`);
  }
  bru.log('✅ Lesson started', { sessionId: response.body.sessionId });
